<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ShortLink AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="background-glow"></div>

<div class="container">

    <div class="card">

        <div class="logo">
            🚀
        </div>

        <h1>ShortLink AI</h1>

        <p class="subtitle">
            Shorten, manage and track your URLs with ease.
        </p>

        <form method="POST">

            <input
                type="url"
                name="url"
                placeholder="https://example.com/very-long-url"
                required>

            <button type="submit">
                Generate Link
            </button>

        </form>

        {% if short_url %}

        <div class="result">

            <h3>Your Short URL</h3>

            <p>{{ short_url }}</p>

        </div>

        {% endif %}

        <div class="features">

            <div class="feature">
                ⚡ Fast
            </div>

            <div class="feature">
                🔒 Secure
            </div>

            <div class="feature">
                📊 Analytics
            </div>

        </div>

        <div class="stats">

            <div class="stat">

                <h3>10K+</h3>

                <span>Links</span>

            </div>

            <div class="stat">

                <h3>50K+</h3>

                <span>Clicks</span>

            </div>

            <div class="stat">

                <h3>99%</h3>

                <span>Uptime</span>

            </div>

        </div>

    </div>

</div>

</body>

</html>
